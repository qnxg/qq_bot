[rabbitmq]
url = "amqp://用户名:密码@ip地址:端口/VirtualHost" # VirtualHost 需要 URL 编码，如 / 编码为 %2F
feedback_queue = "feedback.qqrobot"       # 在哪个队列上接收反馈消息

[database]
max_connections = 5  # SQLite 建议使用较小的连接数，通常 5-10 足够
database_url = "sqlite:feedback.db"  # SQLite 数据库文件路径，会自动创建

[feedback]
admin_qq = [""] # 管理员 QQ 号列表
group_id = ""   # 机器人响应哪个群

[yqwork]
token = ""                                   # 工作台的 token。登陆工作台后，HTTP 请求头中的 Authorization 字段（token 一般有效期是一天）
url = "https://api.work.qnxg.cn" # 末尾不用添加 /
